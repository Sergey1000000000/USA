<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>US Creative Paradise | Local Customer Flow System</title>

  <meta name="description" content="A local customer flow system for HVAC, plumbing, electrical, roofing, handyman and landscaping businesses. Get more local calls with offline advertising." />

  <!-- Google Ads tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18116989824"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    gtag('js', new Date());

    gtag('config', 'AW-18116989824');

    // 🔥 GOOGLE CONVERSION (ГЛАВНОЕ)
    function gtag_report_conversion(url) {
      var callback = function () {
        if (typeof(url) !== 'undefined') {
          window.location = url;
        }
      };

      gtag('event', 'conversion', {
        'send_to': 'AW-18116989824/z9HRCKOI1aUcEICn7b5D',
        'value': 1.0,
        'currency': 'USD',
        'event_callback': callback
      });

      return false;
    }

    // 🔥 PHONE CLICK (СВЯЗКА)
    function trackPhoneClick(url) {
      gtag('event', 'phone_click', {
        'event_category': 'lead',
        'event_label': 'phone_call'
      });

      return gtag_report_conversion(url);
    }

    // ПРОЧИЕ СОБЫТИЯ (НЕ ТРОГАЛ)
    function trackEvent(eventName, category, label) {
      gtag('event', eventName, {
        'event_category': category,
        'event_label': label
      });
    }

    function trackMessageClick() {
      gtag('event', 'message_click', {
        'event_category': 'lead',
        'event_label': 'sms_click'
      });
    }

    function trackFormSubmit() {
      gtag('event', 'form_submit', {
        'event_category': 'lead',
        'event_label': 'form_sent'
      });
    }

    function trackOutboundClick(name) {
      gtag('event', 'outbound_click', {
        'event_category': 'outbound',
        'event_label': name
      });
    }

    // 🔥 АВТО-ТРЕКИНГ (ГЛАВНАЯ МАГИЯ)
    document.addEventListener('click', function(e) {
      var link = e.target.closest('a');
      if (!link) return;

      var href = link.getAttribute('href');
      if (!href) return;

      // PHONE
      if (href.startsWith('tel:')) {
        e.preventDefault();
        trackPhoneClick(href);
        return;
      }

      // SMS
      if (href.startsWith('sms:')) {
        trackMessageClick();
      }

      // OUTBOUND
      if (href.startsWith('http') && !href.includes(window.location.hostname)) {
        trackOutboundClick(href);
      }
    });

    document.addEventListener('submit', function(e) {
      trackFormSubmit();
    });
  </script>
</head>

<body>

  <!-- 🔥 ВАЖНО: КНОПКИ УЖЕ ПРАВИЛЬНЫЕ -->
  <a href="tel:+13214155540" onclick="return trackPhoneClick('tel:+13214155540');">
    CALL NOW
  </a>

  <a href="sms:+13214155540">
    TEXT NOW
  </a>

</body>
</html>
