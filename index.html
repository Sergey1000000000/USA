<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>US Creative Paradise</title>
<style>
body {
  font-family: Arial;
  background: #ffffff;
  padding: 40px;
}

.container {
  max-width: 500px;
  margin: auto;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
}

button {
  background: black;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Get More Calls</h2>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone">
<input id="business" placeholder="Your Business">
<input id="cars" placeholder="How many vehicles?">

<button onclick="send()">GET QUOTE</button>

<p id="status"></p>
</div>

<script>
function send() {
  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    business: document.getElementById("business").value,
    source: document.getElementById("cars").value
  };

  fetch("https://script.google.com/macros/s/AKfycbwiPw2BQ0Ok81-ysLa1iOm2IBfh8svEyjvV_-l8vVtGQZgpf-tZxbOkv8PSGzYZlQNOAg/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    document.getElementById("status").innerText = "Sent!";
  })
  .catch(() => {
    document.getElementById("status").innerText = "Error!";
  });
}
</script>

</body>
</html>
