    function selectIndustry(industry) {
      document.getElementById("business").value = industry;
      document.getElementById("quote-form").scrollIntoView({ behavior: "smooth" });
      setTimeout(() => document.getElementById("name").focus(), 500);
    }

    async function sendLead() {
      const c = content[currentLang];
      const data = {
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        business: document.getElementById("business").value.trim(),
        source: document.getElementById("neighborhood").value.trim()
      };
      if (!data.name || !data.phone || !data.business || !data.source) {
        document.getElementById("formStatus").innerText = c.fill;
        return;
      }
      trackFormSubmit();
      document.getElementById("formStatus").innerText = "...";
      try {
        const response = await fetch(WEBHOOK_URL, { method: "POST", body: JSON.stringify(data) });
        if (response.ok) {
          document.getElementById("formStatus").innerText = c.sent;
          document.getElementById("name").value = "";
          document.getElementById("phone").value = "";
          document.getElementById("business").value = "";
          document.getElementById("neighborhood").value = "";
        } else {
          document.getElementById("formStatus").innerText = c.error;
        }
      } catch (e) {
        document.getElementById("formStatus").innerText = c.error;
      }
    }
