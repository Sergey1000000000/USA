<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Creative Paradise</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f4ee;
      color: #111;
    }

    .hero {
      background: #ffffff;
      padding: 64px 24px 44px;
      border-bottom: 1px solid #ece7dc;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
    }

    .lang {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 26px;
    }

    .lang button {
      background: #111;
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: #f3efe8;
      color: #4a4a4a;
      font-weight: bold;
      font-size: 14px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 60px;
      line-height: 1.03;
      color: #111;
      max-width: 980px;
    }

    .subtitle {
      margin: 0 0 24px;
      font-size: 24px;
      line-height: 1.45;
      color: #444;
      max-width: 900px;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 24px 0 28px;
    }

    .btn {
      display: inline-block;
      padding: 16px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: 0.18s ease;
      border: none;
      cursor: pointer;
      text-align: center;
    }

    .btn-primary {
      background: #111;
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: #111;
      border: 1px solid #d7d7d7;
    }

    .btn-third {
      background: #d8b36a;
      color: #111;
    }

    .trust {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 10px;
    }

    .trust-item {
      background: #faf8f5;
      border: 1px solid #e9e2d9;
      border-radius: 12px;
      padding: 16px;
      font-size: 17px;
      line-height: 1.45;
      color: #2f2f2f;
    }

    .section {
      max-width: 1180px;
      margin: 0 auto;
      padding: 64px 24px;
    }

    .section h2 {
      margin: 0 0 16px;
      font-size: 42px;
      color: #111;
    }

    .section p.lead {
      margin: 0 0 26px;
      font-size: 22px;
      color: #444;
      max-width: 900px;
      line-height: 1.5;
    }

    .three-col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card {
      background: #fff;
      border: 1px solid #ebe4da;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 24px;
      color: #111;
    }

    .card p {
      margin: 0;
      font-size: 18px;
      line-height: 1.5;
      color: #444;
    }

    .industries-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    .industry-box {
      background: #fff;
      border: 1px solid #ebe4da;
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #222;
      text-decoration: none;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      margin-top: 20px;
    }

    .compare-box {
      background: #fff;
      border: 1px solid #ebe4da;
      border-radius: 16px;
      padding: 24px;
    }

    .compare-box h3 {
      margin: 0 0 14px;
      font-size: 26px;
    }

    .compare-box ul {
      margin: 0;
      padding-left: 20px;
    }

    .compare-box li {
      margin-bottom: 10px;
      font-size: 18px;
      line-height: 1.45;
      color: #444;
    }

    .offer-strip {
      background: #111;
      color: #fff;
      border-radius: 20px;
      padding: 36px;
    }

    .offer-strip h2 {
      margin: 0 0 14px;
      color: #fff;
      font-size: 42px;
    }

    .offer-strip p {
      margin: 0 0 22px;
      font-size: 22px;
      line-height: 1.45;
      color: #ddd;
    }

    .form-box {
      margin-top: 18px;
      background: #fff;
      border: 1px solid #ebe4da;
      border-radius: 18px;
      padding: 24px;
    }

    .form-box h3 {
      margin: 0 0 18px;
      font-size: 30px;
      color: #111;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .form-grid input {
      width: 100%;
      padding: 14px;
      border: 1px solid #d8d8d8;
      border-radius: 10px;
      font-size: 16px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .form-status {
      margin-top: 12px;
      font-size: 16px;
      color: #333;
      min-height: 22px;
    }

    .mini-note {
      margin-top: 10px;
      font-size: 15px;
      color: #666;
    }

    .footer {
      padding: 34px 24px 50px;
      color: #666;
      font-size: 15px;
    }

    @media (max-width: 980px) {
      h1 { font-size: 44px; }
      .subtitle { font-size: 21px; }
      .trust,
      .three-col,
      .industries-grid,
      .form-grid,
      .compare-grid {
        grid-template-columns: 1fr;
      }
      .full { grid-column: auto; }
    }

    @media (max-width: 640px) {
      h1 { font-size: 36px; }
      .subtitle { font-size: 19px; }
      .btn { width: 100%; }
      .offer-strip h2,
      .section h2 { font-size: 32px; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="container">
      <div class="lang">
        <button onclick="setLang('en')">EN</button>

        <a class="btn btn-third" href="#quote-form" id="jumpBtn">GET A QUOTE</a>
      </div>

      <div class="trust">
        <div class="trust-item" id="trust1"></div>
        <div class="trust-item" id="trust2"></div>
        <div class="trust-item" id="trust3"></div>
      </div>
    </div>
  </section>

  <section class="section">
    <h2 id="howTitle"></h2>
    <p class="lead" id="howLead"></p>

    <div class="three-col">
      <div class="card">

        <p id="step1Text"></p>
      </div>
      <div class="card">
        <h3 id="step2Title"></h3>
        <p id="step2Text"></p>
      </div>
      <div class="card">

    </div>
  </section>

  <section class="section">
    <h2 id="compareTitle"></h2>
    <p class="lead" id="compareLead"></p>

    <div class="compare-grid">
      <div class="compare-box">
        <h3 id="adsTitle"></h3>
        <ul>
          <li id="ads1"></li>
          <li id="ads2"></li>
          <li id="ads3"></li>
        </ul>
      </div>
      <div class="compare-box">
        <h3 id="systemTitle"></h3>
        <ul>
          <li id="system1"></li>
          <li id="system2"></li>
          <li id="system3"></li>
        </ul>
      </div>
    </div>
  </section>

  <section class="section">
    <h2 id="industriesTitle"></h2>
    <p class="lead" id="industriesLead"></p>

    <div class="industries-grid">
      <a href="#" class="industry-box">HVAC</a>
      <a href="#" class="industry-box">Plumbing</a>
      <a href="#" class="industry-box">Electrical</a>
      <a href="#" class="industry-box">Roofing</a>
      <a href="#" class="industry-box">Handyman</a>
      <a href="#" class="industry-box">Landscaping</a>
    </div>
  </section>

  <section class="section">
    <div class="offer-strip">
      <h2 id="finalTitle"></h2>
      <p id="finalText"></p>

      <div class="cta-row">
        <a id="finalCallBtn" class="btn btn-primary" href="tel:+13214155540">CALL NOW</a>
        <a id="finalTextBtn" class="btn btn-secondary" href="sms:+13214155540">TEXT NOW</a>
      </div>

      <div class="form-box" id="quote-form">
        <h3 id="formTitle"></h3>

        <div class="form-grid">
          <input id="name" class="full" type="text" placeholder="Your name" />
          <input id="phone" type="text" placeholder="Best phone number" />
          <input id="business" type="text" placeholder="Your business type" />
          <input id="vehicles" class="full" type="text" placeholder="How many vehicles do you have?" />
        </div>

        <div class="cta-row" style="margin-top:18px;">
          <button id="quoteBtn" class="btn btn-third" onclick="sendLead()" type="button">GET A QUOTE</button>
        </div>

        <div id="formStatus" class="form-status"></div>
        <div class="mini-note" id="formNote"></div>
      </div>
    </div>
  </section>

  <div class="footer container">
    US Creative Paradise
  </div>

    let currentLang = "ru";

    function setLang(lang) {
      currentLang = lang;
      document.getElementById("eyebrow").innerText = content[lang].eyebrow;
      document.getElementById("title").innerText = content[lang].title;
      document.getElementById("subtitle").innerText = content[lang].subtitle;

      document.getElementById("quoteBtn").innerText = content[lang].quote;
      document.getElementById("jumpBtn").innerText = content[lang].jump;

    async function sendLead() {
      const data = {
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        business: document.getElementById("business").value.trim(),
        source: document.getElementById("vehicles").value.trim()
      };

      if (!data.name || !data.phone || !data.business || !data.source) {
        document.getElementById("formStatus").innerText = content[currentLang].fill;
        return;
      }

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          body: JSON.stringify(data)
        });

        if (response.ok) {
          document.getElementById("formStatus").innerText = content[currentLang].sent;
          document.getElementById("name").value = "";
          document.getElementById("phone").value = "";
          document.getElementById("business").value = "";
          document.getElementById("vehicles").value = "";
        } else {
          document.getElementById("formStatus").innerText = content[currentLang].error;
        }
      } catch (e) {
        document.getElementById("formStatus").innerText = content[currentLang].error;
      }
    }
