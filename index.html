<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Creative Paradise</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111111;
    }

    .hero {
      background: #ffffff;
      padding: 70px 24px 40px;
      border-bottom: 1px solid #ececec;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
    }

    .lang {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .lang button {
      background: #111;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: #f5f5f5;
      color: #444;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 0.2px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 64px;
      line-height: 1.02;
      color: #111;
      max-width: 900px;
    }

    .subtitle {
      margin: 0 0 24px;
      font-size: 24px;
      line-height: 1.45;
      color: #444;
      max-width: 820px;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 24px 0 28px;
    }

    .btn {
      display: inline-block;
      padding: 16px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: 0.18s ease;
    }

    .btn-primary {
      background: #111;
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: #111;
      border: 1px solid #d9d9d9;
    }

    .trust {
      display: grid;
      grid-template-columns: repeat(3, minmax(200px, 1fr));
      gap: 14px;
      margin-top: 10px;
    }

    .trust-item {
      background: #fafafa;
      border: 1px solid #ececec;
      border-radius: 12px;
      padding: 16px;
      font-size: 17px;
      line-height: 1.45;
      color: #2f2f2f;
    }

    .section {
      max-width: 1180px;
      margin: 0 auto;
      padding: 64px 24px;
    }

    .section h2 {
      margin: 0 0 16px;
      font-size: 42px;
      color: #111;
    }

    .section p.lead {
      margin: 0 0 26px;
      font-size: 22px;
      color: #444;
      max-width: 860px;
      line-height: 1.5;
    }

    .three-col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card {
      background: #fff;
      border: 1px solid #ececec;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 24px;
      color: #111;
    }

    .card p {
      margin: 0;
      font-size: 18px;
      line-height: 1.5;
      color: #444;
    }

    .industries-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    .industry-box {
      background: #fff;
      border: 1px solid #ececec;
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #222;
    }

    .footer-cta {
      background: #111;
      color: white;
      border-radius: 20px;
      padding: 36px;
    }

    .footer-cta h2 {
      margin: 0 0 14px;
      color: white;
      font-size: 42px;
    }

    .footer-cta p {
      margin: 0 0 22px;
      font-size: 22px;
      line-height: 1.45;
      color: #ddd;
    }

    @media (max-width: 980px) {
      h1 {
        font-size: 46px;
      }

      .subtitle {
        font-size: 21px;
      }

      .trust,
      .three-col,
      .industries-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 36px;
      }

      .subtitle {
        font-size: 19px;
      }

      .btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="container">
      <div class="lang">
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('ru')">RU</button>
        <button onclick="setLang('es')">ES</button>
      </div>

      <div class="eyebrow" id="eyebrow"></div>
      <h1 id="title"></h1>
      <p class="subtitle" id="subtitle"></p>

      <div class="cta-row">
        <a id="callBtn" class="btn btn-primary" href="tel:+13214155540">CALL NOW</a>
        <a id="textBtn" class="btn btn-secondary" href="sms:+13214155540">TEXT NOW</a>
      </div>

      <div class="trust">
        <div class="trust-item" id="trust1"></div>
        <div class="trust-item" id="trust2"></div>
        <div class="trust-item" id="trust3"></div>
      </div>
    </div>
  </section>

  <section class="section">
    <h2 id="howTitle"></h2>
    <p class="lead" id="howLead"></p>

    <div class="three-col">
      <div class="card">
        <h3 id="step1Title"></h3>
        <p id="step1Text"></p>
      </div>
      <div class="card">
        <h3 id="step2Title"></h3>
        <p id="step2Text"></p>
      </div>
      <div class="card">
        <h3 id="step3Title"></h3>
        <p id="step3Text"></p>
      </div>
    </div>
  </section>

  <section class="section">
    <h2 id="industriesTitle"></h2>
    <p class="lead" id="industriesLead"></p>

    <div class="industries-grid">
      <div class="industry-box">HVAC</div>
      <div class="industry-box">Plumbing</div>
      <div class="industry-box">Electrical</div>
      <div class="industry-box">Roofing</div>
      <div class="industry-box">Handyman</div>
      <div class="industry-box">Landscaping</div>
    </div>
  </section>

  <section class="section">
    <div class="footer-cta">
      <h2 id="finalTitle"></h2>
      <p id="finalText"></p>
      <div class="cta-row">
        <a id="finalCallBtn" class="btn btn-primary" href="tel:+13214155540">CALL NOW</a>
        <a id="finalTextBtn" class="btn btn-secondary" href="sms:+13214155540">TEXT NOW</a>
      </div>
    </div>
  </section>

    function setLang(lang) {
      document.getElementById("eyebrow").innerText = content[lang].eyebrow;

      document.getElementById("industriesTitle").innerText = content[lang].industriesTitle;
      document.getElementById("industriesLead").innerText = content[lang].industriesLead;
      document.getElementById("finalTitle").innerText = content[lang].finalTitle;
      document.getElementById("finalText").innerText = content[lang].finalText;
      document.getElementById("callBtn").innerText = lang === "ru" ? "ПОЗВОНИТЬ" : lang === "es" ? "LLAMAR AHORA" : "CALL NOW";
      document.getElementById("textBtn").innerText = lang === "ru" ? "НАПИСАТЬ" : lang === "es" ? "ESCRIBIR AHORA" : "TEXT NOW";
      document.getElementById("finalCallBtn").innerText = lang === "ru" ? "ПОЗВОНИТЬ" : lang === "es" ? "LLAMAR AHORA" : "CALL NOW";
      document.getElementById("finalTextBtn").innerText = lang === "ru" ? "НАПИСАТЬ" : lang === "es" ? "ESCRIBIR AHORA" : "TEXT NOW";
    }

    setLang("en");
  </script>
</body>
</html>
