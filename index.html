<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Creative Paradise</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f4ee;
      color: #111;
    }

    .hero {
      background: #ffffff;
      padding: 64px 24px 40px;
      border-bottom: 1px solid #ece7dc;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
    }

    .lang {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 26px;
    }

    .lang button {
      background: #111;
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: #f3efe8;
      color: #4a4a4a;
      font-weight: bold;
      font-size: 14px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 60px;
      line-height: 1.03;
      color: #111;
      max-width: 980px;
    }

    .subtitle {
      margin: 0 0 24px;
      font-size: 24px;
      line-height: 1.45;
      color: #444;
      max-width: 850px;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 24px 0 28px;
    }

    .btn {
      display: inline-block;
      padding: 16px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: 0.18s ease;
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: #111;
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: #111;
      border: 1px solid #d7d7d7;
    }

    .btn-third {
      background: #d8b36a;
      color: #111;
    }

    .trust {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 10px;
    }

    .trust-item {
      background: #faf8f5;
      border: 1px solid #e9e2d9;
      border-radius: 12px;
      padding: 16px;
      font-size: 17px;
      line-height: 1.45;
      color: #2f2f2f;
    }

    .section {
      max-width: 1180px;
      margin: 0 auto;
      padding: 64px 24px;
    }

    .section h2 {
      margin: 0 0 16px;
      font-size: 42px;
      color: #111;
    }

    .section p.lead {
      margin: 0 0 26px;
      font-size: 22px;
      color: #444;
      max-width: 900px;
      line-height: 1.5;
    }

    .three-col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card {
      background: #fff;
      border: 1px solid #ebe4da;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 24px;
      color: #111;
    }

    .card p {
      margin: 0;
      font-size: 18px;
      line-height: 1.5;
      color: #444;
    }

    .industries-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    .industry-box {
      background: #fff;
      border: 1px solid #ebe4da;
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #222;
      text-decoration: none;
    }

    .offer-strip {
      background: #111;
      color: #fff;
      border-radius: 20px;
      padding: 36px;
    }

    .offer-strip h2 {
      margin: 0 0 14px;
      color: #fff;
      font-size: 42px;
    }

    .offer-strip p {
      margin: 0 0 22px;
      font-size: 22px;
      line-height: 1.45;
      color: #ddd;
    }

    .form-box {
      margin-top: 18px;
      background: #fff;
      border: 1px solid #ebe4da;
      border-radius: 18px;
      padding: 24px;
    }

    .form-box h3 {
      margin: 0 0 18px;
      font-size: 30px;
      color: #111;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .form-grid input {
      width: 100%;
      padding: 14px;
      border: 1px solid #d8d8d8;
      border-radius: 10px;
      font-size: 16px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .form-status {
      margin-top: 12px;
      font-size: 16px;
      color: #333;
      min-height: 22px;
    }

    .mini-note {
      margin-top: 10px;
      font-size: 15px;
      color: #666;
    }

    .footer {
      padding: 34px 24px 50px;
      color: #666;
      font-size: 15px;
    }

    @media (max-width: 980px) {
      h1 { font-size: 44px; }
      .subtitle { font-size: 21px; }
      .trust,
      .three-col,
      .industries-grid,
      .form-grid {
        grid-template-columns: 1fr;
      }
      .full { grid-column: auto; }
    }

    @media (max-width: 640px) {
      h1 { font-size: 36px; }
      .subtitle { font-size: 19px; }
      .btn { width: 100%; text-align: center; }
      .offer-strip h2,
      .section h2 { font-size: 32px; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="container">
      <div class="lang">
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('ru')">RU</button>
        <button onclick="setLang('es')">ES</button>
      </div>

      <div class="eyebrow" id="eyebrow"></div>
      <h1 id="title"></h1>
      <p class="subtitle" id="subtitle"></p>

      <div class="cta-row">
        <a id="callBtn" class="btn btn-primary" href="tel:+13214155540">CALL NOW</a>
        <a id="textBtn" class="btn btn-secondary" href="sms:+13214155540">TEXT NOW</a>
        <a class="btn btn-third" href="#quote-form" id="jumpBtn">GET A QUOTE</a>
      </div>

      <div class="trust">
        <div class="trust-item" id="trust1"></div>
        <div class="trust-item" id="trust2"></div>
        <div class="trust-item" id="trust3"></div>
      </div>
    </div>
  </section>

  <section class="section">
    <h2 id="howTitle"></h2>
    <p class="lead" id="howLead"></p>

    <div class="three-col">
      <div class="card">
        <h3 id="step1Title"></h3>
        <p id="step1Text"></p>
      </div>
      <div class="card">
        <h3 id="step2Title"></h3>
        <p id="step2Text"></p>
      </div>
      <div class="card">
        <h3 id="step3Title"></h3>
        <p id="step3Text"></p>
      </div>
    </div>
  </section>

  <section class="section">
    <h2 id="industriesTitle"></h2>
    <p class="lead" id="industriesLead"></p>

    <div class="industries-grid">
      <a href="#" class="industry-box">HVAC</a>
      <a href="#" class="industry-box">Plumbing</a>
      <a href="#" class="industry-box">Electrical</a>
      <a href="#" class="industry-box">Roofing</a>
      <a href="#" class="industry-box">Handyman</a>
      <a href="#" class="industry-box">Landscaping</a>
    </div>
  </section>

  <section class="section">
    <div class="offer-strip">
      <h2 id="finalTitle"></h2>
      <p id="finalText"></p>

      <div class="cta-row">
        <a id="finalCallBtn" class="btn btn-primary" href="tel:+13214155540">CALL NOW</a>
        <a id="finalTextBtn" class="btn btn-secondary" href="sms:+13214155540">TEXT NOW</a>
      </div>

      <div class="form-box" id="quote-form">
        <h3 id="formTitle"></h3>

        <div class="form-grid">
          <input id="name" class="full" type="text" placeholder="Your name" />
          <input id="phone" type="text" placeholder="Best phone number" />
          <input id="business" type="text" placeholder="Your business type" />
          <input id="vehicles" class="full" type="text" placeholder="How many vehicles do you have?" />
        </div>

        <div class="cta-row" style="margin-top:18px;">
          <button id="quoteBtn" class="btn btn-third" onclick="sendLead()" type="button">GET A QUOTE</button>
        </div>

        <div id="formStatus" class="form-status"></div>
        <div class="mini-note" id="formNote"></div>
      </div>
    </div>
  </section>

  <div class="footer container">
    US Creative Paradise
  </div>

  <script>
    const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwiPw2BQ0Ok81-ysLa1iOm2IBfh8svEyjvV_-l8vVtGQZgpf-tZxbOkv8PSGzYZlQNOAg/exec";

    const content = {
      en: {
        eyebrow: "For HVAC, plumbing, electrical, roofing, handyman and local service businesses",
        title: "Get More Local Calls Without Wasting Money on Ads",
        subtitle: "Turn your vehicle, your local visibility and your street presence into real customer calls, booked jobs and steady growth.",
        trust1: "More direct calls from real local buyers",
        trust2: "Stay visible 24/7 without paying per click",
        trust3: "Simple launch. Long-term results.",
        howTitle: "How this gets you customers",
        howLead: "Your next customers are already outside. The job is to put your business in front of them with a message they understand in seconds.",
        step1Title: "1. Clear message",
        step1Text: "Your offer gets easier to understand, easier to trust and easier to call.",
        step2Title: "2. Daily visibility",
        step2Text: "Your business stays in front of local buyers where they already drive, stop and notice.",
        step3Title: "3. More incoming calls",
        step3Text: "You get more direct calls instead of burning money on weak traffic and forgettable ads.",
        industriesTitle: "Top industries we start with",
        industriesLead: "We launch first where local demand is strongest and where calls turn into money fastest.",
        finalTitle: "Ready to get more calls?",
        finalText: "Fill out the short form below. We’ll understand your business fast and show you the smartest next step.",
        formTitle: "Get a Quote",
        formNote: "4 short questions. No long forms. No wasted time.",
        call: "CALL NOW",
        text: "TEXT NOW",
        quote: "GET A QUOTE",
        jump: "GET A QUOTE",
        sent: "Request sent.",
        error: "Error. Try again.",
        fill: "Fill in all fields."
      },
      ru: {
        eyebrow: "Для HVAC, plumbing, electrical, roofing, handyman и локального сервисного бизнеса",
        title: "Получи больше локальных звонков без слива денег в рекламу",
        subtitle: "Преврати свою машину, локальную видимость и уличное присутствие в реальные звонки клиентов, заказы и стабильный рост.",
        trust1: "Больше прямых звонков от реальных местных клиентов",
        trust2: "Видимость 24/7 без оплаты за каждый клик",
        trust3: "Простой запуск. Долгий результат.",
        howTitle: "Как это приводит тебе клиентов",
        howLead: "Твои следующие клиенты уже снаружи. Твоя задача — показать им свой бизнес с понятным сообщением, которое считывается за секунды.",
        step1Title: "1. Понятный оффер",
        step1Text: "Твоё предложение становится понятнее, убедительнее и легче приводит к звонку.",
        step2Title: "2. Ежедневная видимость",
        step2Text: "Твой бизнес постоянно видят там, где местные покупатели уже ездят, останавливаются и замечают.",
        step3Title: "3. Больше входящих звонков",
        step3Text: "Ты получаешь больше прямых звонков вместо того, чтобы сжигать деньги на слабый трафик и забываемую рекламу.",
        industriesTitle: "Топ-ниши, с которых начинаем",
        industriesLead: "Сначала идём туда, где локальный спрос сильнее всего и где звонки быстрее всего превращаются в деньги.",
        finalTitle: "Готов получить больше звонков?",
        finalText: "Заполни короткую форму ниже. Мы быстро поймём твой бизнес и покажем самый умный следующий шаг.",
        formTitle: "Получить расчёт",
        formNote: "4 коротких вопроса. Без длинных анкет. Без потери времени.",
        call: "ПОЗВОНИТЬ",
        text: "НАПИСАТЬ",
        quote: "ПОЛУЧИТЬ РАСЧЁТ",
        jump: "ПОЛУЧИТЬ РАСЧЁТ",
        sent: "Заявка отправлена.",
        error: "Ошибка. Попробуй ещё раз.",
        fill: "Заполни все поля."
      },
      es: {
        eyebrow: "Para HVAC, plomería, electricidad, roofing, handyman y negocios de servicio local",
        title: "Obtén más llamadas locales sin tirar dinero en publicidad",
        subtitle: "Convierte tu vehículo, tu visibilidad local y tu presencia en la calle en llamadas reales, trabajos cerrados y crecimiento constante.",
        trust1: "Más llamadas directas de clientes locales reales",
        trust2: "Visibilidad 24/7 sin pagar por cada clic",
        trust3: "Lanzamiento simple. Resultados duraderos.",
        howTitle: "Cómo esto te consigue clientes",
        howLead: "Tus próximos clientes ya están afuera. La clave es poner tu negocio frente a ellos con un mensaje que entiendan en segundos.",
        step1Title: "1. Oferta clara",
        step1Text: "Tu oferta se vuelve más clara, más confiable y más fácil de convertir en llamada.",
        step2Title: "2. Visibilidad diaria",
        step2Text: "Tu negocio se mantiene frente a compradores locales donde ya manejan, paran y miran.",
        step3Title: "3. Más llamadas entrantes",
        step3Text: "Recibes más llamadas directas en vez de quemar dinero en tráfico débil y anuncios olvidables.",
        industriesTitle: "Industrias principales para empezar",
        industriesLead: "Empezamos donde la demanda local es más fuerte y donde las llamadas se convierten en dinero más rápido.",
        finalTitle: "¿Listo para recibir más llamadas?",
        finalText: "Completa el formulario corto abajo. Entenderemos tu negocio rápido y te mostraremos el siguiente paso más inteligente.",
        formTitle: "Solicitar cotización",
        formNote: "4 preguntas cortas. Sin formularios largos. Sin perder tiempo.",
        call: "LLAMAR AHORA",
        text: "ESCRIBIR AHORA",
        quote: "SOLICITAR COTIZACIÓN",
        jump: "SOLICITAR COTIZACIÓN",
        sent: "Solicitud enviada.",
        error: "Error. Inténtalo de nuevo.",
        fill: "Completa todos los campos."
      }
    };

    let currentLang = "en";

    function setLang(lang) {
      currentLang = lang;
      document.getElementById("eyebrow").innerText = content[lang].eyebrow;
      document.getElementById("title").innerText = content[lang].title;
      document.getElementById("subtitle").innerText = content[lang].subtitle;
      document.getElementById("trust1").innerText = content[lang].trust1;
      document.getElementById("trust2").innerText = content[lang].trust2;
      document.getElementById("trust3").innerText = content[lang].trust3;
      document.getElementById("howTitle").innerText = content[lang].howTitle;
      document.getElementById("howLead").innerText = content[lang].howLead;
      document.getElementById("step1Title").innerText = content[lang].step1Title;
      document.getElementById("step1Text").innerText = content[lang].step1Text;
      document.getElementById("step2Title").innerText = content[lang].step2Title;
      document.getElementById("step2Text").innerText = content[lang].step2Text;
      document.getElementById("step3Title").innerText = content[lang].step3Title;
      document.getElementById("step3Text").innerText = content[lang].step3Text;
      document.getElementById("industriesTitle").innerText = content[lang].industriesTitle;
      document.getElementById("industriesLead").innerText = content[lang].industriesLead;
      document.getElementById("finalTitle").innerText = content[lang].finalTitle;
      document.getElementById("finalText").innerText = content[lang].finalText;
      document.getElementById("formTitle").innerText = content[lang].formTitle;
      document.getElementById("formNote").innerText = content[lang].formNote;
      document.getElementById("callBtn").innerText = content[lang].call;
      document.getElementById("textBtn").innerText = content[lang].text;
      document.getElementById("finalCallBtn").innerText = content[lang].call;
      document.getElementById("finalTextBtn").innerText = content[lang].text;
      document.getElementById("quoteBtn").innerText = content[lang].quote;
      document.getElementById("jumpBtn").innerText = content[lang].jump;
    }

    async function sendLead() {
      const data = {
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        business: document.getElementById("business").value.trim(),
        source: document.getElementById("vehicles").value.trim()
      };

      if (!data.name || !data.phone || !data.business || !data.source) {
        document.getElementById("formStatus").innerText = content[currentLang].fill;
        return;
      }

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          body: JSON.stringify(data)
        });

        if (response.ok) {
          document.getElementById("formStatus").innerText = content[currentLang].sent;
          document.getElementById("name").value = "";
          document.getElementById("phone").value = "";
          document.getElementById("business").value = "";
          document.getElementById("vehicles").value = "";
        } else {
          document.getElementById("formStatus").innerText = content[currentLang].error;
        }
      } catch (e) {
        document.getElementById("formStatus").innerText = content[currentLang].error;
      }
    }

    setLang("en");
  </script>
</body>
</html>
