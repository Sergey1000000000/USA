<style>
  * { box-sizing: border-box; }

  :root {
    --bg: #f8f5ef;
    --white: #ffffff;
    --black: #111111;
    --text: #1f1f1f;
    --muted: #4f4f4f;
    --line: #e8dfd2;
    --gold: #d8a94f;
    --gold-light: #e7bd66;
    --soft: #fbf8f2;
    --shadow: 0 12px 35px rgba(0,0,0,0.08);
    --shadow-strong: 0 18px 45px rgba(0,0,0,0.16);
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .hero {
    background: radial-gradient(circle at top right, #fff7e3 0%, #ffffff 36%, #ffffff 100%);
    padding: 52px 24px 54px;
    border-bottom: 1px solid var(--line);
  }

  .container {
    max-width: 1180px;
    margin: 0 auto;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 38px;
  }

  .brand {
    font-size: 23px;
    font-weight: 900;
    letter-spacing: -0.03em;
  }

  .lang {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .lang button {
    background: var(--black);
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.22s ease;
  }

  .lang button:hover {
    background: var(--gold);
    color: #111;
    transform: translateY(-2px);
  }

  .eyebrow {
    display: inline-block;
    padding: 9px 15px;
    margin-bottom: 18px;
    border-radius: 999px;
    background: #f2e6cc;
    color: #5c4300;
    font-weight: 900;
    font-size: 14px;
  }

  h1 {
    margin: 0 0 18px;
    font-size: 60px;
    line-height: 1.03;
    color: var(--black);
    max-width: 990px;
    letter-spacing: -0.045em;
  }

  .subtitle {
    margin: 0 0 26px;
    font-size: 24px;
    line-height: 1.48;
    color: var(--muted);
    max-width: 930px;
  }

  .cta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin: 26px 0 30px;
  }

  .btn {
    display: inline-block;
    padding: 17px 26px;
    border-radius: 14px;
    text-decoration: none;
    font-size: 18px;
    font-weight: 900;
    transition: all 0.24s ease;
    border: none;
    cursor: pointer;
    text-align: center;
    position: relative;
  }

  .btn:hover {
    transform: scale(1.05) translateY(-2px);
    box-shadow: var(--shadow-strong);
  }

  .btn:active {
    transform: scale(0.96);
  }

  .btn-primary {
    background: var(--black);
    color: #fff;
  }

  .btn-secondary {
    background: var(--white);
    color: var(--black);
    border: 1px solid var(--line);
  }

  .btn-third {
    background: var(--gold);
    color: #111;
    box-shadow: 0 8px 24px rgba(216,169,79,0.35);
    animation: softPulse 2.6s infinite;
  }

  .btn-third:hover {
    background: var(--gold-light);
  }

  @keyframes softPulse {
    0% { box-shadow: 0 0 0 0 rgba(216,169,79,0.45); }
    70% { box-shadow: 0 0 0 12px rgba(216,169,79,0); }
    100% { box-shadow: 0 0 0 0 rgba(216,169,79,0); }
  }

  .trust {
    display: grid;
    grid-template-columns: repeat(3, minmax(220px, 1fr));
    gap: 16px;
    margin-top: 12px;
  }

  .trust-item {
    background: var(--soft);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 20px;
    font-size: 18px;
    line-height: 1.45;
    color: #2f2f2f;
    font-weight: 800;
    box-shadow: var(--shadow);
  }

  .section {
    max-width: 1180px;
    margin: 0 auto;
    padding: 70px 24px;
  }

  .section h2 {
    margin: 0 0 16px;
    font-size: 44px;
    color: var(--black);
    line-height: 1.08;
    letter-spacing: -0.04em;
  }

  .section p.lead {
    margin: 0 0 28px;
    font-size: 22px;
    color: var(--muted);
    max-width: 940px;
    line-height: 1.5;
  }

  .three-col,
  .proof-list,
  .industry-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  .card, .compare-box, .industry-card, .proof-strip {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 26px;
    box-shadow: var(--shadow);
  }

  .card h3, .industry-card h3, .compare-box h3 {
    margin: 0 0 12px;
    font-size: 25px;
    color: var(--black);
    line-height: 1.15;
  }

  .card p, .industry-card p {
    margin: 0;
    font-size: 18px;
    line-height: 1.55;
    color: var(--muted);
  }

  .compare-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
    margin-top: 20px;
  }

  .compare-box ul {
    margin: 0;
    padding-left: 20px;
  }

  .compare-box li {
    margin-bottom: 10px;
    font-size: 18px;
    line-height: 1.45;
    color: var(--muted);
  }

  .industry-card {
    cursor: pointer;
    transition: all 0.24s ease;
  }

  .industry-card:hover {
    transform: translateY(-5px);
    border-color: var(--gold);
    box-shadow: var(--shadow-strong);
  }

  .industry-card span {
    display: inline-block;
    margin-top: 16px;
    font-weight: 900;
    color: var(--black);
    border-bottom: 3px solid var(--gold);
  }

  .proof-item {
    background: var(--soft);
    border-radius: 18px;
    padding: 22px;
    font-size: 18px;
    line-height: 1.45;
    font-weight: 800;
  }

  .offer-strip {
    background: linear-gradient(135deg, #111111, #252017);
    color: #fff;
    border-radius: 26px;
    padding: 40px;
    box-shadow: var(--shadow-strong);
  }

  .offer-strip h2 {
    margin: 0 0 14px;
    color: #fff;
    font-size: 44px;
    line-height: 1.08;
  }

  .offer-strip p {
    margin: 0 0 22px;
    font-size: 22px;
    line-height: 1.45;
    color: #e6e6e6;
  }

  .form-box {
    margin-top: 20px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 26px;
  }

  .form-box h3 {
    margin: 0 0 18px;
    font-size: 32px;
    color: var(--black);
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  .form-grid input {
    width: 100%;
    padding: 16px;
    border: 1px solid #d8d8d8;
    border-radius: 12px;
    font-size: 16px;
    transition: all 0.2s ease;
  }

  .form-grid input:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(216,169,79,0.18);
  }

  .full {
    grid-column: 1 / -1;
  }

  .form-status {
    margin-top: 12px;
    font-size: 16px;
    color: #333;
    min-height: 22px;
    font-weight: 800;
  }

  .mini-note {
    margin-top: 10px;
    font-size: 15px;
    color: #666;
  }

  .footer {
    padding: 34px 24px 50px;
    color: #666;
    font-size: 15px;
  }

  @media (max-width: 980px) {
    h1 { font-size: 44px; }
    .subtitle { font-size: 21px; }
    .trust,
    .three-col,
    .compare-grid,
    .industry-grid,
    .proof-list,
    .form-grid {
      grid-template-columns: 1fr;
    }
    .full { grid-column: auto; }
  }

  @media (max-width: 640px) {
    .topbar {
      align-items: flex-start;
      flex-direction: column;
    }

    h1 {
      font-size: 36px;
    }

    .subtitle {
      font-size: 19px;
    }

    .btn {
      width: 100%;
    }

    .offer-strip h2,
    .section h2 {
      font-size: 32px;
    }

    .hero {
      padding-top: 34px;
    }
  }
</style>
