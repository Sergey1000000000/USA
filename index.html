<div class="eyebrow" id="eyebrow"></div>
  <h1 id="title"></h1>
  <p class="subtitle" id="subtitle"></p>

  <div class="cta-row">
    <a id="callBtn" class="btn btn-primary" href="tel:+13214155540">CALL NOW</a>
    <a id="textBtn" class="btn btn-secondary" href="sms:+13214155540">TEXT NOW</a>
    <a class="btn btn-third" href="#quote-form" id="jumpBtn">GET A QUOTE</a>
  </div>

  <div class="trust">
    <div class="trust-item" id="trust1"></div>
    <div class="trust-item" id="trust2"></div>
    <div class="trust-item" id="trust3"></div>
  </div>
</div>

<div class="three-col">
  <div class="card">
    <h3 id="step1Title"></h3>
    <p id="step1Text"></p>
  </div>
  <div class="card">
    <h3 id="step2Title"></h3>
    <p id="step2Text"></p>
  </div>
  <div class="card">
    <h3 id="step3Title"></h3>
    <p id="step3Text"></p>
  </div>
</div>

<div class="compare-grid">
  <div class="compare-box">
    <h3 id="adsTitle"></h3>
    <ul>
      <li id="ads1"></li>
      <li id="ads2"></li>
      <li id="ads3"></li>
    </ul>
  </div>

  <div class="compare-box">
    <h3 id="systemTitle"></h3>
    <ul>
      <li id="system1"></li>
      <li id="system2"></li>
      <li id="system3"></li>
    </ul>
  </div>
</div>

<div class="industry-grid">
  <div class="industry-card" onclick="selectIndustry('HVAC')">
    <h3 id="ind1Title"></h3>
    <p id="ind1Text"></p>
    <span id="indCta1"></span>
  </div>
  <div class="industry-card" onclick="selectIndustry('Plumbing')">
    <h3 id="ind2Title"></h3>
    <p id="ind2Text"></p>
    <span id="indCta2"></span>
  </div>
  <div class="industry-card" onclick="selectIndustry('Electrical')">
    <h3 id="ind3Title"></h3>
    <p id="ind3Text"></p>
    <span id="indCta3"></span>
  </div>
  <div class="industry-card" onclick="selectIndustry('Roofing')">
    <h3 id="ind4Title"></h3>
    <p id="ind4Text"></p>
    <span id="indCta4"></span>
  </div>
  <div class="industry-card" onclick="selectIndustry('Handyman')">
    <h3 id="ind5Title"></h3>
    <p id="ind5Text"></p>
    <span id="indCta5"></span>
  </div>
  <div class="industry-card" onclick="selectIndustry('Landscaping')">
    <h3 id="ind6Title"></h3>
    <p id="ind6Text"></p>
    <span id="indCta6"></span>
  </div>
</div>

  <div class="cta-row">
    <a id="finalCallBtn" class="btn btn-primary" href="tel:+13214155540">CALL NOW</a>
    <a id="finalTextBtn" class="btn btn-secondary" href="sms:+13214155540">TEXT NOW</a>
  </div>

  <div class="form-box" id="quote-form">
    <h3 id="formTitle"></h3>

    <div class="form-grid">
      <input id="name" class="full" type="text" />
      <input id="phone" type="text" />
      <input id="business" type="text" />
      <input id="vehicles" class="full" type="text" />
    </div>

    <div class="cta-row" style="margin-top:18px;">
      <button id="quoteBtn" class="btn btn-third" onclick="sendLead()" type="button">GET A QUOTE</button>
    </div>

    <div id="formStatus" class="form-status"></div>
    <div class="mini-note" id="formNote"></div>
  </div>
</div>
