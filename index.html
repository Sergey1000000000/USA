  document.getElementById("h1").innerText = c.h1;
  document.getElementById("heroSub").innerText = c.heroSub;
  document.getElementById("btnCall").innerText = c.btnCall;
  document.getElementById("btnText").innerText = c.btnText;
  document.getElementById("btnQuote").innerText = c.btnQuote;
  document.getElementById("chk1").innerText = c.chk1;
  document.getElementById("chk2").innerText = c.chk2;
  document.getElementById("chk3").innerText = c.chk3;

  document.getElementById("baBeforeLabel").innerText = c.baBeforeLabel;
  document.getElementById("baAfterLabel").innerText = c.baAfterLabel;
  const bl = document.getElementById("baBeforeList");
  const al = document.getElementById("baAfterList");
  bl.innerHTML = c.baBefore.map(x=>`<li>${x}</li>`).join("");
  al.innerHTML = c.baAfter.map(x=>`<li>${x}</li>`).join("");

  document.getElementById("stepsTitle").innerText = c.stepsTitle;
  document.getElementById("s1t").innerText = c.s1t; document.getElementById("s1p").innerText = c.s1p;
  document.getElementById("s2t").innerText = c.s2t; document.getElementById("s2p").innerText = c.s2p;
  document.getElementById("s3t").innerText = c.s3t; document.getElementById("s3p").innerText = c.s3p;

  document.getElementById("proofBig").innerText = c.proofBig;
  document.getElementById("proofDesc").innerText = c.proofDesc;
  document.getElementById("proofDetail").innerText = c.proofDetail;

  document.getElementById("cmpTitle").innerText = c.cmpTitle;
  document.getElementById("cmpLead").innerText = c.cmpLead;
  document.getElementById("cmpBadTitle").innerText = c.cmpBadTitle;
  document.getElementById("cmpGoodTitle").innerText = c.cmpGoodTitle;

  document.getElementById("cmpGoodList").innerHTML = c.cmpGood.map(x=>`<li>${x}</li>`).join("");

  document.getElementById("nichesLead").innerText = c.nichesLead;

function pick(biz) {
  document.getElementById("fBiz").value = biz;
  document.getElementById("form").scrollIntoView({ behavior: "smooth" });
  setTimeout(() => document.getElementById("fName").focus(), 500);
}

async function send() {
  const c = C[lang];
  const data = {
    name: document.getElementById("fName").value.trim(),
    phone: document.getElementById("fPhone").value.trim(),
    business: document.getElementById("fBiz").value.trim(),
    source: document.getElementById("fArea").value.trim()
  };
  if (!data.name || !data.phone || !data.business || !data.source) {
    document.getElementById("fStatus").innerText = c.fill;
    return;
  }
  trackForm();
  document.getElementById("fStatus").innerText = "...";
  try {
    const r = await fetch(WH, { method:"POST", body: JSON.stringify(data) });
    document.getElementById("fStatus").innerText = r.ok ? c.ok : c.err;
    if (r.ok) {
      document.getElementById("fName").value = "";
      document.getElementById("fPhone").value = "";
      document.getElementById("fBiz").value = "";
      document.getElementById("fArea").value = "";
    }
  } catch(e) {
    document.getElementById("fStatus").innerText = c.err;
  }
}
