<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Creative Paradise</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f4ee;
      color: #1f1f1f;
    }

    .hero {
      min-height: 100vh;
      background:
        linear-gradient(
          to bottom,
          rgba(255,255,255,0.18),
          rgba(255,255,255,0.10),
          rgba(255,255,255,0.18)
        ),
        url('Картинка%20на%20сайт.jpg') center center / cover no-repeat;
      display: flex;
      align-items: center;
    }

    .overlay {
      width: 100%;
      max-width: 820px;
      margin-left: 6%;
      padding: 48px 24px;
      background: rgba(255, 255, 255, 0.70);
      backdrop-filter: blur(4px);
      border-radius: 18px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.12);
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: #f3e0a3;
      color: #5d4300;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 0.4px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 58px;
      line-height: 1.02;
      color: #1c1c1c;
      max-width: 760px;
    }

    .subtitle {
      margin: 0 0 22px;
      font-size: 24px;
      line-height: 1.42;
      color: #333;
      max-width: 720px;
    }

    .lang {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .lang button {
      background: #111;
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 22px 0 26px;
    }

    .btn {
      display: inline-block;
      padding: 16px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .btn-primary {
      background: #111;
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: #111;
      border: 1px solid #d8d1c7;
    }

    .trust {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 10px;
    }

    .trust-item {
      background: rgba(255,255,255,0.88);
      border: 1px solid #e6dfd4;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 17px;
      line-height: 1.4;
      color: #2c2c2c;
    }

    .section {
      max-width: 1180px;
      margin: 0 auto;
      padding: 64px 24px;
    }

    .section h2 {
      margin: 0 0 16px;
      font-size: 40px;
      color: #1f1f1f;
    }

    .section p.lead {
      margin: 0 0 26px;
      font-size: 22px;
      color: #444;
      max-width: 860px;
      line-height: 1.45;
    }

    .three-col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card {
      background: #fff;
      border: 1px solid #e8e1d8;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.05);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    .card p,
    .card li {
      font-size: 18px;
      line-height: 1.5;
      color: #3e3e3e;
    }

    .card ul {
      margin: 0;
      padding-left: 20px;
    }

    .industries-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    .industry-box {
      background: #fff;
      border: 1px solid #e8e1d8;
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #2b2b2b;
      box-shadow: 0 8px 22px rgba(0,0,0,0.04);
    }

    .footer-cta {
      background: #111;
      color: white;
      border-radius: 22px;
      padding: 34px;
    }

    .footer-cta h2 {
      color: white;
      margin-bottom: 14px;
    }

    .footer-cta p {
      font-size: 21px;
      color: #ddd;
      margin-bottom: 22px;
    }

    @media (max-width: 980px) {
      h1 {
        font-size: 44px;
      }

      .subtitle {
        font-size: 21px;
      }

      .trust,
      .three-col,
      .industries-grid {
        grid-template-columns: 1fr;
      }

      .overlay {
        margin: 18px;
        max-width: none;
      }
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 36px;
      }

      .subtitle {
        font-size: 19px;
      }

      .btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="overlay">
      <div class="lang">
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('ru')">RU</button>
        <button onclick="setLang('es')">ES</button>
      </div>

      <div class="eyebrow" id="eyebrow"></div>
      <h1 id="title"></h1>
      <p class="subtitle" id="subtitle"></p>

      <div class="cta-row">

      <div class="trust">

        <div class="trust-item" id="trust3"></div>
      </div>
    </div>
  </section>

  <section class="section">
    <h2 id="howTitle"></h2>
    <p class="lead" id="howLead"></p>

    <div class="three-col">
      <div class="card">
        <h3 id="step1Title"></h3>
        <p id="step1Text"></p>
      </div>
      <div class="card">
        <h3 id="step2Title"></h3>
        <p id="step2Text"></p>
      </div>
      <div class="card">
        <h3 id="step3Title"></h3>

    </div>
  </section>

  <section class="section">
    <h2 id="industriesTitle"></h2>
    <p class="lead" id="industriesLead"></p>

    <div class="industries-grid">
      <div class="industry-box">HVAC</div>
      <div class="industry-box">Plumbing</div>
      <div class="industry-box">Electrical</div>
      <div class="industry-box">Roofing</div>
      <div class="industry-box">Handyman</div>
      <div class="industry-box">Landscaping</div>
    </div>
  </section>

  <section class="section">
    <div class="footer-cta">
      <h2 id="finalTitle"></h2>
      <p id="finalText"></p>
      <div class="cta-row">
        <a id="finalCallBtn" class="btn btn-primary" href="tel:+13214155540"></a>

    </div>
  </section>

</body>
</html>
